<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="utf-8">

<!-- GitHub Pages Cache Control -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Mobile Novel Reader</title>

<!-- PWA manifest -->
<link rel="manifest" href="data:application/json,{
'name':'Novel Reader',
'short_name':'Reader',
'start_url':'.',
'display':'standalone',
'background_color':'#ffffff',
'theme_color':'#000000'
}">

<style>

/* =========================
基本樣式
========================= */

body{
margin:0;
font-family:system-ui;
background:#fff;
color:#000;
overflow:hidden;
}

#reader{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
display:flex;
justify-content:center;
align-items:center;
padding:5%;
}

#page{
width:100%;
max-width:700px;
line-height:1.6;
font-size:18px;
}

/* =========================
夜間模式
========================= */

body.night{
background:#000;
color:#ccc;
}

/* =========================
工具列
========================= */

#toolbar{
position:fixed;
bottom:0;
left:0;
right:0;
background:rgba(0,0,0,0.8);
color:#fff;
padding:10px;
display:none;
font-size:14px;
}

button{
margin:3px;
}

/* =========================
朗讀高亮
========================= */

.highlight{
background:#ccc;
}

</style>

</head>

<body>

<div id="reader">
<div id="page"></div>
</div>

<div id="toolbar">

<button onclick="toggleNight()">夜間</button>

<button onclick="startReading()">朗讀</button>

<button onclick="stopReading()">停止</button>

<button onclick="addBookmark()">書籤</button>

<span id="version">v1.0.0</span>

</div>

<input type="file" id="fileInput" accept=".txt" style="display:none">

<script>

/* ===================================
全域狀態
=================================== */

let paragraphs=[]
let pages=[]

let currentPage=0

let fontSize=18
let lineHeight=1.6

let speechRate=1

let speaking=false
let currentSpeakIndex=0


/* ===================================
拖曳 TXT
=================================== */

document.body.addEventListener("dragover",e=>{
e.preventDefault()
})

document.body.addEventListener("drop",e=>{
e.preventDefault()
loadFile(e.dataTransfer.files[0])
})


/* ===================================
上傳 TXT
=================================== */

document.body.addEventListener("dblclick",()=>{
document.getElementById("fileInput").click()
})

document.getElementById("fileInput").addEventListener("change",e=>{
loadFile(e.target.files[0])
})


/* ===================================
讀取 TXT
=================================== */

function loadFile(file){

let reader=new FileReader()

reader.onload=function(){

let text=reader.result

parseText(text)

}

reader.readAsText(file)

}


/* ===================================
TXT 解析
=================================== */

function parseText(text){

paragraphs=text.split(/\n+/)

buildPages()

renderPage()

}


/* ===================================
智慧分頁
=================================== */

function buildPages(){

pages=[]

let page=[]

let charLimit=800

let count=0

for(let p of paragraphs){

if(p.length>500){

let parts=p.match(/.{1,500}/g)

for(let part of parts){

addParagraph(part)

}

}else{

addParagraph(p)

}

}

function addParagraph(p){

if(count+p.length>charLimit){

pages.push(page)

page=[]

count=0

}

page.push(p)

count+=p.length

}

pages.push(page)

}


/* ===================================
渲染頁面
=================================== */

function renderPage(){

let pageDiv=document.getElementById("page")

pageDiv.innerHTML=""

let pageData=pages[currentPage]

if(!pageData) return

pageData.forEach((p,i)=>{

let div=document.createElement("p")

div.textContent=p

div.dataset.index=i

pageDiv.appendChild(div)

})

}


/* ===================================
翻頁
=================================== */

document.body.addEventListener("click",e=>{

let x=e.clientX
let w=window.innerWidth

if(x<w*0.3){

prevPage()

}else if(x>w*0.7){

nextPage()

}else{

toggleToolbar()

}

})

function nextPage(){

if(currentPage<pages.length-1){

currentPage++

renderPage()

saveProgress()

}

}

function prevPage(){

if(currentPage>0){

currentPage--

renderPage()

saveProgress()

}

}


/* ===================================
工具列
=================================== */

function toggleToolbar(){

let bar=document.getElementById("toolbar")

bar.style.display=bar.style.display=="none"?"block":"none"

}


/* ===================================
夜間模式
=================================== */

function toggleNight(){

document.body.classList.toggle("night")

localStorage.setItem("night",
document.body.classList.contains("night"))

}


/* ===================================
朗讀
=================================== */

function startReading(){

speaking=true

readCurrent()

}

function stopReading(){

speechSynthesis.cancel()

speaking=false

}


function readCurrent(){

if(!speaking) return

let page=document.querySelectorAll("#page p")

if(currentSpeakIndex>=page.length){

nextPage()

currentSpeakIndex=0

readCurrent()

return

}

let el=page[currentSpeakIndex]

highlight(el)

let utter=new SpeechSynthesisUtterance(el.textContent)

utter.rate=speechRate

utter.onend=()=>{

currentSpeakIndex++

readCurrent()

}

speechSynthesis.speak(utter)

}


function highlight(el){

document.querySelectorAll("p").forEach(p=>{
p.classList.remove("highlight")
})

el.classList.add("highlight")

}


/* ===================================
書籤
=================================== */

function addBookmark(){

let b=JSON.parse(localStorage.getItem("bookmarks")||"[]")

b.push(currentPage)

localStorage.setItem("bookmarks",JSON.stringify(b))

alert("已加入書籤")

}


/* ===================================
閱讀記錄
=================================== */

function saveProgress(){

localStorage.setItem("page",currentPage)

}

function loadProgress(){

let p=localStorage.getItem("page")

if(p) currentPage=parseInt(p)

}


/* ===================================
簡轉繁（簡易）
=================================== */

function simpleConvert(text){

let map={
"汉":"漢",
"龙":"龍"
}

return text.replace(/[汉龙]/g,m=>map[m])

}


/* ===================================
PWA Service Worker
=================================== */

if('serviceWorker' in navigator){

let swCode=`

self.addEventListener('install',e=>{
self.skipWaiting()
})

self.addEventListener('fetch',e=>{})

`

let blob=new Blob([swCode],{type:'text/javascript'})

let url=URL.createObjectURL(blob)

navigator.serviceWorker.register(url)

}


/* ===================================
初始化
=================================== */

loadProgress()
renderPage()

</script>

</body>
</html>
