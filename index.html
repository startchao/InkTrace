<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>墨痕 InkTrace - 流光閱讀器</title>
    <style>
        :root {
            --bg: #f4f1ea; --surface: #ffffff; --text: #2c2c2c;
            --accent: #8e6d5d; --highlight: rgba(142, 109, 93, 0.15);
            --border: #dcd7ce; --safe-top: env(safe-area-inset-top, 0px);
        }

        /* 夜間模式 */
        [data-theme="dark"] {
            --bg: #1a1a1a; --surface: #242424; --text: #d1d1d1;
            --accent: #c49a6c; --highlight: rgba(196, 154, 108, 0.2);
            --border: #333;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            height: 100%; margin: 0; overflow: hidden; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            background: var(--bg); color: var(--text); transition: 0.3s;
        }

        /* 佈局 */
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        header { 
            padding: calc(var(--safe-top) + 10px) 20px 10px; 
            background: var(--surface); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }

        .reader-viewport { 
            flex: 1; position: relative; overflow: hidden; 
            padding: 20px; display: flex; justify-content: center;
        }

        #content-area {
            width: 100%; max-width: 800px; line-height: 2; font-size: 18px;
            text-align: justify; transition: transform 0.3s ease;
        }

        /* 直排模式樣式 */
        .vertical-mode {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            height: 80%; width: auto !important;
            max-width: none !important;
        }

        /* 流光高亮效果 */
        p { 
            margin-bottom: 1.5em; padding: 4px 8px; border-radius: 6px;
            transition: background 0.4s ease, transform 0.2s;
            cursor: pointer;
        }
        p.reading-active { 
            background: var(--highlight); 
            box-shadow: 0 0 0 2px var(--highlight);
            transform: scale(1.01);
        }

        /* 控制面板 */
        .controls {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--surface); border-top: 1px solid var(--border);
            padding: 15px 20px calc(env(safe-area-inset-bottom) + 15px);
            display: flex; justify-content: space-around; transform: translateY(100%);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000;
        }
        .controls.show { transform: translateY(0); }

        .btn {
            background: none; border: 1px solid var(--border); color: var(--text);
            padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 14px;
        }
        .btn.primary { background: var(--accent); color: white; border: none; }

        /* 書架介面 */
        #library {
            position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            padding: 40px 20px; overflow-y: auto;
        }
        .book-card {
            background: var(--surface); padding: 20px; border-radius: 12px;
            margin-bottom: 15px; border: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .hidden { display: none !important; }

        /* 翻譯小標籤 */
        .translation {
            display: block; font-size: 0.8em; color: var(--accent);
            margin-top: 4px; opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div style="font-weight: bold; letter-spacing: 2px;">墨痕 INKTRACE</div>
        <button class="btn" onclick="toggleLibrary()">書庫</button>
    </header>

    <main class="reader-viewport" onclick="toggleUI()">
        <div id="content-area">
            <p style="text-align: center; margin-top: 100px; color: #888;">請從書庫匯入 TXT 檔案開始閱讀</p>
        </div>
    </main>

    <div class="controls" id="main-controls">
        <button class="btn" onclick="prevPage()">上一頁</button>
        <button id="tts-btn" class="btn primary" onclick="handleTTS()">▶ 聽書</button>
        <button class="btn" id="convert-btn" onclick="toggleConvert()">繁</button>
        <button class="btn" onclick="toggleVertical()">直排</button>
        <button class="btn" onclick="nextPage()">下一頁</button>
    </div>
</div>

<div id="library">
    <h2 style="margin-bottom: 30px;">我的書庫</h2>
    <input type="file" id="file-input" accept=".txt" hidden onchange="importFile(event)">
    <button class="btn primary" style="width: 100%; padding: 15px; margin-bottom: 20px;" onclick="document.getElementById('file-input').click()">+ 匯入新書 (TXT)</button>
    <div id="book-list"></div>
</div>

<script>
    // --- 狀態管理 ---
    let state = {
        rawText: "",
        paragraphs: [],
        currentPage: 0,
        pageSize: 10, // 每頁顯示段落數
        isReading: false,
        currentParaIdx: 0,
        isVertical: false,
        isConverted: true,
        books: []
    };

    const synth = window.speechSynthesis;
    let utterance = null;

    // --- 初始化 ---
    window.onload = () => {
        loadLibrary();
    };

    // --- 書庫功能 ---
    function importFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const book = {
                id: Date.now(),
                title: file.name.replace('.txt', ''),
                content: event.target.result,
                progress: 0
            };
            state.books.push(book);
            saveLibrary();
            renderLibrary();
        };
        reader.readAsText(file);
    }

    function renderLibrary() {
        const list = document.getElementById('book-list');
        list.innerHTML = state.books.map(b => `
            <div class="book-card" onclick="openBook(${b.id})">
                <div>
                    <div style="font-weight: 500;">${b.title}</div>
                    <div style="font-size: 12px; color: #888;">已讀 ${b.progress}%</div>
                </div>
                <button class="btn" onclick="event.stopPropagation(); deleteBook(${b.id})">刪除</button>
            </div>
        `).join('');
    }

    function openBook(id) {
        const book = state.books.find(b => b.id === id);
        state.rawText = book.content;
        state.paragraphs = state.rawText.split('\n').filter(p => p.trim() !== "");
        state.currentPage = 0;
        state.currentParaIdx = 0;
        renderPage();
        toggleLibrary();
    }

    // --- 渲染引擎 ---
    function renderPage() {
        const start = state.currentPage * state.pageSize;
        const end = start + state.pageSize;
        const pageParas = state.paragraphs.slice(start, end);
        
        const area = document.getElementById('content-area');
        area.innerHTML = pageParas.map((p, i) => `
            <p id="para-${start + i}" onclick="jumpToPara(${start + i})">${p}</p>
        `).join('');
        
        updateProgress();
    }

    // --- 流光聽書系統 (核心邏輯) ---
    function handleTTS() {
        if (state.isReading) {
            stopTTS();
        } else {
            startTTS();
        }
    }

    function startTTS() {
        if (state.currentParaIdx >= state.paragraphs.length) return;
        
        state.isReading = true;
        document.getElementById('tts-btn').textContent = "⏸ 暫停";
        speakParagraph(state.currentParaIdx);
    }

    function speakParagraph(idx) {
        if (!state.isReading || idx >= state.paragraphs.length) return;

        // 檢查是否需要自動翻頁
        const startIdx = state.currentPage * state.pageSize;
        const endIdx = startIdx + state.pageSize;
        
        if (idx >= endIdx) {
            nextPage(); 
            // 翻頁後延遲一下再繼續，確保 DOM 已渲染
            setTimeout(() => speakParagraph(idx), 300);
            return;
        }

        state.currentParaIdx = idx;
        
        // 視覺高亮 (流光效果)
        document.querySelectorAll('p').forEach(p => p.classList.remove('reading-active'));
        const activeP = document.getElementById(`para-${idx}`);
        if (activeP) {
            activeP.classList.add('reading-active');
            activeP.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // 語音合成
        utterance = new SpeechSynthesisUtterance(state.paragraphs[idx]);
        utterance.lang = 'zh-TW';
        utterance.rate = 1.0;

        utterance.onend = () => {
            if (state.isReading) {
                speakParagraph(idx + 1);
            }
        };

        synth.speak(utterance);
    }

    function stopTTS() {
        state.isReading = false;
        synth.cancel();
        document.getElementById('tts-btn').textContent = "▶ 聽書";
        document.querySelectorAll('p').forEach(p => p.classList.remove('reading-active'));
    }

    // --- 頁面交互 ---
    function nextPage() {
        if ((state.currentPage + 1) * state.pageSize < state.paragraphs.length) {
            state.currentPage++;
            renderPage();
        }
    }

    function prevPage() {
        if (state.currentPage > 0) {
            state.currentPage--;
            renderPage();
        }
    }

    function jumpToPara(idx) {
        state.currentParaIdx = idx;
        if (state.isReading) {
            synth.cancel();
            speakParagraph(idx);
        }
    }

    function toggleVertical() {
        state.isVertical = !state.isVertical;
        document.getElementById('content-area').classList.toggle('vertical-mode');
    }

    function toggleUI() {
        document.getElementById('main-controls').classList.toggle('show');
    }

    function toggleLibrary() {
        document.getElementById('library').classList.toggle('hidden');
    }

    function updateProgress() {
        const total = state.paragraphs.length;
        const current = (state.currentPage + 1) * state.pageSize;
        const progress = Math.min(100, Math.round((current / total) * 100));
        // 此處可擴充儲存到資料庫
    }

    // --- 資料持久化 ---
    function saveLibrary() { localStorage.setItem('it_library', JSON.stringify(state.books)); }
    function loadLibrary() {
        const saved = localStorage.getItem('it_library');
        if (saved) {
            state.books = JSON.parse(saved);
            renderLibrary();
        }
    }
    function deleteBook(id) {
        state.books = state.books.filter(b => b.id !== id);
        saveLibrary();
        renderLibrary();
    }
</script>

</body>
</html>
