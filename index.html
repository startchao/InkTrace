<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 專業閱讀器 v2.0.1q</title>
    <style>
        :root { --bg: #f4f1e9; --text: #33322e; --primary: #007aff; --ui-bg: rgba(255,255,255,0.98); }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        
        /* 書庫畫面 */
        #library { padding: calc(env(safe-area-inset-top) + 20px) 20px; max-width: 600px; margin: 0 auto; height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .v-tag { font-size: 10px; background: #ff9500; color: white; padding: 2px 8px; border-radius: 10px; }
        .upload-zone { border: 2px dashed #bbb; padding: 40px 20px; border-radius: 20px; background: white; text-align: center; cursor: pointer; margin-bottom: 25px; }
        .book-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        /* 閱讀器 */
        #reader { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 1000; }
        #content-canvas { height: calc(100vh - 100px); margin: 50px 0; column-width: 100vw; column-gap: 0; transition: transform 0.2s ease; }
        #content-text { padding: 0 25px; font-size: 22px; line-height: 1.8; white-space: pre-wrap; word-break: break-all; text-align: justify; }

        /* 選單控制 */
        .touch-zone { position: fixed; top: 0; height: 100%; z-index: 1001; }
        #zone-prev { left: 0; width: 30%; }
        #zone-menu { left: 30%; width: 40%; }
        #zone-next { right: 0; width: 30%; }

        .ui-panel { position: fixed; left: 0; width: 100%; background: var(--ui-bg); backdrop-filter: blur(15px); transition: 0.3s; z-index: 1010; opacity: 0; pointer-events: none; }
        #ui-top { top: 0; padding: calc(env(safe-area-inset-top) + 10px) 20px 15px 20px; transform: translateY(-100%); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        #ui-bottom { bottom: 0; padding: 15px 20px calc(env(safe-area-inset-bottom) + 15px) 20px; transform: translateY(100%); border-top: 1px solid #ddd; }
        .ui-show { opacity: 1; pointer-events: auto; transform: translateY(0) !important; }

        /* 目錄側欄 */
        #toc-panel { position: fixed; left: -100%; top: 0; width: 85%; height: 100%; background: white; z-index: 2000; transition: 0.3s; overflow-y: auto; padding: calc(env(safe-area-inset-top) + 20px) 20px; box-sizing: border-box; }
        .toc-item { padding: 16px; border-bottom: 1px solid #eee; font-size: 14px; }
        #toc-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1999; }
        
        button { border: none; background: #efeff4; padding: 10px 18px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="library">
    <h2 style="display:flex; justify-content:space-between; align-items:center;">我的書庫 <span class="v-tag">v2.0.1q</span></h2>
    
    <div class="upload-zone" onclick="document.getElementById('f').click()">
        <div style="font-size:30px;">📂</div>
        <div style="font-weight:bold; color:var(--primary); margin-top:10px;">點擊載入 TXT 檔案</div>
        <div style="font-size:11px; color:#999; margin-top:5px;">支援超大檔案且自動解決亂碼</div>
    </div>
    
    <input type="file" id="f" style="display:none" onchange="handleFile(this)">
    <div id="book-list"></div>
    
    <button onclick="localStorage.clear(); location.reload();" style="margin-top:50px; width:100%; opacity:0.2; font-size:10px;">重置系統 (當機時使用)</button>
</div>

<div id="reader">
    <div id="zone-prev" class="touch-zone" onclick="pageMove(-1)"></div>
    <div id="zone-menu" class="touch-zone" onclick="toggleUI()"></div>
    <div id="zone-next" class="touch-zone" onclick="pageMove(1)"></div>

    <div id="ui-top" class="ui-panel">
        <button onclick="openTOC()">≡ 目錄</button>
        <div id="cur-title" style="font-weight:bold; flex:1; text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin:0 15px;">書名</div>
        <button onclick="closeReader()" style="color:red;">退出</button>
    </div>

    <div id="content-viewport"><div id="content-canvas"><div id="content-text"></div></div></div>

    <div id="ui-bottom" class="ui-panel">
        <div id="page-info" style="text-align:center; font-size:12px; color:#666; margin-bottom:12px;">讀取中...</div>
        <div style="display:flex; justify-content:space-around;">
            <button onclick="adjSize(2)">A +</button>
            <button onclick="adjSize(-2)">A -</button>
            <button onclick="toggleTC()" id="tc-btn">轉為繁體</button>
        </div>
    </div>
</div>

<div id="toc-overlay" onclick="closeTOC()"></div>
<div id="toc-panel"><h3>章節目錄</h3><div id="toc-list"></div></div>

<script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>
<script>
    let library = JSON.parse(localStorage.getItem('lib_v6') || '[]');
    let currentData = "", chunks = [], chapters = [], curChunkIdx = 0, curPageIdx = 0, isTC = false, currentBookId = null;
    const CHUNK_SIZE = 40000;
    const converter = OpenCC.Converter({ from: 'cn', to: 'twp' });

    function handleFile(input) {
        const file = input.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            let content = e.target.result;
            // 亂碼修正
            if (content.includes('\uFFFD')) {
                const gReader = new FileReader();
                gReader.onload = (ge) => processBook(file.name, ge.target.result);
                gReader.readAsText(file, "GBK");
            } else { processBook(file.name, content); }
        };
        reader.readAsText(file, "UTF-8");
    }

    function processBook(name, data) {
        // v2.0.1q 策略：不儲存龐大的 data 到 localStorage，僅持有在記憶體中
        currentData = data;
        const id = "book_" + Date.now();
        const bookInfo = { id: id, name: name.replace('.txt','') };
        
        // 更新清單
        library.push(bookInfo);
        localStorage.setItem('lib_v6', JSON.stringify(library));
        
        // 直接開啟閱讀
        initReader(bookInfo.name, data, id);
    }

    function renderLibrary() {
        const list = document.getElementById('book-list');
        list.innerHTML = library.map((b, i) => `
            <div class="book-card" onclick="alert('請重新點擊上傳按鈕載入該檔案讀取')">
                <strong>${b.name}</strong>
                <button onclick="event.stopPropagation(); deleteBook(${i})" style="color:red;">✕</button>
            </div>`).join('') || '<p style="text-align:center; color:#999; margin-top:50px;">請點擊上方按鈕載入 TXT</p>';
    }

    function initReader(name, data, id) {
        currentBookId = id;
        currentData = data;
        document.getElementById('cur-title').innerText = name;
        
        // 重新掃描章節
        chapters = [];
        const reg = /(第?\s*[0-9一二三四五六七八九十百千萬]+[章節回卷].*)|(楔子.*)|(序章.*)/g;
        let m;
        while ((m = reg.exec(data)) !== null) {
            chapters.push({ name: m[0].trim(), pos: m.index });
        }
        renderTOC();

        chunks = [];
        for (let i = 0; i < data.length; i += CHUNK_SIZE) chunks.push(data.substring(i, i + CHUNK_SIZE));
        
        // 恢復進度
        const progress = JSON.parse(localStorage.getItem('progress_' + id) || '{"c":0, "p":0}');
        curChunkIdx = progress.c; curPageIdx = progress.p;
        
        loadChunk();
        document.getElementById('library').style.display = 'none';
        document.getElementById('reader').style.display = 'block';
    }

    function renderTOC() {
        document.getElementById('toc-list').innerHTML = chapters.map(ch => 
            `<div class="toc-item" onclick="jumpToChapter(${ch.pos})">${ch.name}</div>`).join('');
    }

    function jumpToChapter(pos) {
        curChunkIdx = Math.floor(pos / CHUNK_SIZE);
        const chunkRelativePos = pos % CHUNK_SIZE;
        loadChunk();
        setTimeout(() => {
            const canvas = document.getElementById('content-canvas');
            const maxPages = Math.round(canvas.scrollWidth / window.innerWidth);
            curPageIdx = Math.floor((chunkRelativePos / chunks[curChunkIdx].length) * maxPages);
            applyPage();
            updateInfo();
        }, 150);
        closeTOC();
    }

    function loadChunk() {
        const textEl = document.getElementById('content-text');
        textEl.textContent = isTC ? converter(chunks[curChunkIdx]) : chunks[curChunkIdx];
        setTimeout(updateInfo, 50);
        applyPage();
    }

    function pageMove(dir) {
        if(document.getElementById('ui-top').classList.contains('ui-show')) { toggleUI(); return; }
        const canvas = document.getElementById('content-canvas');
        const max = Math.round(canvas.scrollWidth / window.innerWidth);
        if (dir === 1 && curPageIdx >= max - 1) {
            if (curChunkIdx < chunks.length - 1) { curChunkIdx++; curPageIdx = 0; loadChunk(); }
        } else if (dir === -1 && curPageIdx <= 0) {
            if (curChunkIdx > 0) { curChunkIdx--; curPageIdx = 0; loadChunk(); }
        } else {
            curPageIdx += dir; applyPage();
        }
        updateInfo();
        saveProgress();
    }

    function saveProgress() {
        if(currentBookId) localStorage.setItem('progress_' + currentBookId, JSON.stringify({c: curChunkIdx, p: curPageIdx}));
    }

    function applyPage() { document.getElementById('content-canvas').style.transform = `translateX(-${curPageIdx * 100}vw)`; }
    function toggleUI() { document.getElementById('ui-top').classList.toggle('ui-show'); document.getElementById('ui-bottom').classList.toggle('ui-show'); }
    function updateInfo() {
        const canvas = document.getElementById('content-canvas');
        const max = Math.round(canvas.scrollWidth / window.innerWidth) || 1;
        document.getElementById('page-info').innerText = `區段 ${curChunkIdx + 1}/${chunks.length} · 頁碼 ${curPageIdx + 1}/${max}`;
    }
    function adjSize(n) {
        const el = document.getElementById('content-text');
        el.style.fontSize = (parseInt(window.getComputedStyle(el).fontSize) + n) + 'px';
        setTimeout(() => { updateInfo(); applyPage(); }, 150);
    }
    function toggleTC() {
        isTC = !isTC;
        document.getElementById('tc-btn').innerText = isTC ? "恢復簡體" : "轉為繁體";
        loadChunk();
    }
    function deleteBook(idx) { library.splice(idx, 1); localStorage.setItem('lib_v6', JSON.stringify(library)); renderLibrary(); }
    function openTOC() { document.getElementById('toc-panel').style.left = '0'; document.getElementById('toc-overlay').style.display = 'block'; }
    function closeTOC() { document.getElementById('toc-panel').style.left = '-100%'; document.getElementById('toc-overlay').style.display = 'none'; }
    function closeReader() { 
        saveProgress();
        document.getElementById('library').style.display = 'block'; document.getElementById('reader').style.display = 'none'; 
        renderLibrary();
    }
    
    renderLibrary();
</script>
</body>
</html>
