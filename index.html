<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>

<title>Novel Reader</title>

<link rel="manifest" href="data:application/json,{
'name':'Novel Reader',
'short_name':'Reader',
'start_url':'.',
'display':'standalone'
}">

<style>

/* 基本 */

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#ffffff;
color:#000;
overflow:hidden;
}

/* 載入畫面 */

#loader{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

text-align:center;
padding:30px;
}

#loader button{
font-size:18px;
padding:12px 20px;
margin-top:20px;
}

/* 閱讀區 */

#reader{
display:none;

position:absolute;
top:0;
left:0;
right:0;
bottom:0;

padding:6%;
overflow:hidden;
}

#page{
max-width:700px;
margin:auto;

font-size:20px;
line-height:1.6;
}

/* 夜間模式 */

body.night{
background:#000;
color:#ccc;
}

/* 工具列 */

#toolbar{

position:fixed;
bottom:0;
left:0;
right:0;

background:rgba(0,0,0,0.8);

color:#fff;

padding:10px;

display:none;
}

button{
margin:4px;
}

/* 朗讀高亮 */

.highlight{
background:#ccc;
}

</style>
</head>

<body>

<!-- 載入小說畫面 -->

<div id="loader">

<h2>手機小說閱讀器</h2>

<p>支援 TXT 小說</p>

<button onclick="openFile()">載入 TXT</button>

<p style="margin-top:20px;font-size:14px">
或拖曳 TXT 到畫面
</p>

<p style="font-size:12px;color:#666">
v1.0.1
</p>

</div>

<!-- 閱讀區 -->

<div id="reader">

<div id="page"></div>

</div>

<!-- 工具列 -->

<div id="toolbar">

<button onclick="toggleNight()">夜間</button>

<button onclick="startReading()">朗讀</button>

<button onclick="stopReading()">停止</button>

<button onclick="addBookmark()">書籤</button>

<span style="float:right">v1.0.1</span>

</div>

<input type="file" id="fileInput" accept=".txt" style="display:none">

<script>

/* 狀態 */

let paragraphs=[]
let pages=[]

let currentPage=0

let speechRate=1

let speaking=false
let speakIndex=0


/* 開檔 */

function openFile(){

document.getElementById("fileInput").click()

}

document.getElementById("fileInput").addEventListener("change",e=>{

loadFile(e.target.files[0])

})


/* 拖曳 */

document.body.addEventListener("dragover",e=>{

e.preventDefault()

})

document.body.addEventListener("drop",e=>{

e.preventDefault()

loadFile(e.dataTransfer.files[0])

})


/* 讀檔 */

function loadFile(file){

let reader=new FileReader()

reader.onload=function(){

let text=reader.result

startReader(text)

}

reader.readAsText(file)

}


/* 啟動閱讀 */

function startReader(text){

document.getElementById("loader").style.display="none"

document.getElementById("reader").style.display="block"

parseText(text)

buildPages()

renderPage()

}


/* 解析 */

function parseText(text){

paragraphs=text.split(/\n+/)

}


/* 分頁 */

function buildPages(){

pages=[]

let page=[]

let limit=800

let count=0

for(let p of paragraphs){

if(p.length>500){

let parts=p.match(/.{1,500}/g)

parts.forEach(add)

}else{

add(p)

}

}

function add(p){

if(count+p.length>limit){

pages.push(page)

page=[]
count=0
}

page.push(p)

count+=p.length

}

pages.push(page)

}


/* 渲染 */

function renderPage(){

let pageDiv=document.getElementById("page")

pageDiv.innerHTML=""

let data=pages[currentPage]

if(!data) return

data.forEach((p,i)=>{

let el=document.createElement("p")

el.textContent=p

el.dataset.index=i

pageDiv.appendChild(el)

})

saveProgress()

}


/* 點擊翻頁 */

document.body.addEventListener("click",e=>{

if(document.getElementById("reader").style.display!="block")
return

let x=e.clientX
let w=window.innerWidth

if(x<w*0.3){

prevPage()

}else if(x>w*0.7){

nextPage()

}else{

toggleToolbar()

}

})


function nextPage(){

if(currentPage<pages.length-1){

currentPage++

renderPage()

}

}

function prevPage(){

if(currentPage>0){

currentPage--

renderPage()

}

}


/* 工具列 */

function toggleToolbar(){

let bar=document.getElementById("toolbar")

bar.style.display=bar.style.display=="none"?"block":"none"

}


/* 夜間 */

function toggleNight(){

document.body.classList.toggle("night")

}


/* 朗讀 */

function startReading(){

speaking=true

speakIndex=0

read()

}

function stopReading(){

speechSynthesis.cancel()

speaking=false

}


function read(){

if(!speaking) return

let ps=document.querySelectorAll("#page p")

if(speakIndex>=ps.length){

nextPage()

speakIndex=0

read()

return

}

let el=ps[speakIndex]

highlight(el)

let u=new SpeechSynthesisUtterance(el.textContent)

u.rate=speechRate

u.onend=()=>{

speakIndex++

read()

}

speechSynthesis.speak(u)

}


function highlight(el){

document.querySelectorAll("p").forEach(p=>p.classList.remove("highlight"))

el.classList.add("highlight")

}


/* 書籤 */

function addBookmark(){

let b=JSON.parse(localStorage.getItem("bookmarks")||"[]")

b.push(currentPage)

localStorage.setItem("bookmarks",JSON.stringify(b))

alert("已加入書籤")

}


/* 記錄 */

function saveProgress(){

localStorage.setItem("page",currentPage)

}

</script>

</body>
</html>
