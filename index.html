<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 閱讀器 v2.0.1L</title>
    <style>
        :root { --bg: #f4f1e9; --text: #33322e; --primary: #007aff; }
        body { background: var(--bg); color: var(--text); font-family: "PingFang TC", sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        
        /* 書庫介面 */
        #library { padding: env(safe-area-inset-top) 20px; max-width: 600px; margin: 0 auto; text-align: center; }
        .v-tag { font-size: 10px; background: #ff9500; color: white; padding: 2px 8px; border-radius: 10px; }
        .upload-area { 
            border: 2px dashed #ccc; padding: 40px 20px; border-radius: 20px; 
            background: white; margin-top: 30px; cursor: pointer;
        }

        /* 閱讀器介面 */
        #reader { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 1000; }
        #content-viewport { width: 100vw; height: 100vh; overflow: hidden; }
        #content-canvas { 
            height: calc(100vh - 80px); margin: 40px 0; 
            column-width: 100vw; column-gap: 0; transition: transform 0.2s ease-out; 
        }
        #content-text { 
            padding: 0 25px; font-size: 22px; line-height: 1.8; 
            white-space: pre-wrap; word-break: break-all; text-align: justify; 
        }

        /* 交互熱區 */
        .touch-zone { position: fixed; top: 0; height: 100%; z-index: 1001; }
        #zone-prev { left: 0; width: 30%; }
        #zone-menu { left: 30%; width: 40%; }
        #zone-next { right: 0; width: 30%; }

        /* 選單浮層 */
        .ui-panel { 
            position: fixed; left: 0; width: 100%; background: rgba(255,255,255,0.98); 
            backdrop-filter: blur(15px); transition: 0.3s; z-index: 1010; opacity: 0; pointer-events: none; 
        }
        #ui-top { top: 0; padding: env(safe-area-inset-top) 20px 15px 20px; transform: translateY(-100%); border-bottom: 1px solid #ddd; }
        #ui-bottom { bottom: 0; padding: 15px 20px calc(env(safe-area-inset-bottom) + 15px) 20px; transform: translateY(100%); border-top: 1px solid #ddd; }
        .ui-show { opacity: 1; pointer-events: auto; transform: translateY(0) !important; }

        button { border: none; background: #efeff4; padding: 12px 20px; border-radius: 12px; font-size: 14px; }
        .btn-p { background: var(--primary); color: white; font-weight: bold; }
    </style>
</head>
<body>

<div id="library">
    <h2 style="margin-top:40px;">我的書庫 <span class="v-tag">v2.0.1L</span></h2>
    <div class="upload-area" onclick="document.getElementById('f').click()">
        <div style="font-size: 40px; margin-bottom: 10px;">📖</div>
        <div style="font-weight:bold; color:var(--primary);">點擊此處載入小說</div>
        <div style="font-size:12px; color:#888; margin-top:8px;">支援超大檔案 (UTF-8 / GBK 自動轉碼)</div>
    </div>
    <input type="file" id="f" style="display:none" onchange="handleFile(this)">
    <p style="margin-top:30px; font-size:12px; color:#999; line-height:1.6;">
        為了保護手機記憶體，本版採「即時載入」模式。<br>
        如果您正在閱讀大檔案，請勿清理後台。
    </p>
</div>

<div id="reader">
    <div id="zone-prev" class="touch-zone" onclick="pageMove(-1)"></div>
    <div id="zone-menu" class="touch-zone" onclick="toggleUI()"></div>
    <div id="zone-next" class="touch-zone" onclick="pageMove(1)"></div>

    <div id="ui-top" class="ui-panel">
        <div id="cur-title" style="font-weight:bold; font-size:16px;">書名</div>
    </div>

    <div id="content-viewport">
        <div id="content-canvas"><div id="content-text"></div></div>
    </div>

    <div id="ui-bottom" class="ui-panel">
        <div id="page-info" style="text-align:center; font-size:12px; color:#666; margin-bottom:12px;">載入中...</div>
        <div style="display:flex; justify-content:space-around;">
            <button onclick="adjSize(2)">A +</button>
            <button onclick="adjSize(-2)">A -</button>
            <button onclick="toggleTC()" id="tc-btn">轉為繁體</button>
            <button onclick="closeReader()" style="background:#ff3b30; color:white;">關閉</button>
        </div>
    </div>
</div>

<script>
    let chunks = [], curChunkIdx = 0, curPageIdx = 0, isTC = false;
    const CHUNK_SIZE = 45000;
    
    // 簡易簡繁對應
    const tMap = {"说":"說","书":"書","门":"門","长":"長","家":"家","后":"後","蚂":"螞","蚱":"蚱","离":"離","间":"間","断":"斷","圣":"聖","元":"元","虽":"雖","战":"戰","万":"萬"};
    function toTC(text) { return text.split('').map(c => tMap[c] || c).join(''); }

    function handleFile(input) {
        const file = input.files[0]; if (!file) return;
        const reader = new FileReader();
        
        reader.onload = (e) => {
            let content = e.target.result;
            // 亂碼判斷邏輯優化
            if (content.includes('\uFFFD') || content.length < 10) {
                const gReader = new FileReader();
                gReader.onload = (ge) => startReader(file.name, ge.target.result);
                gReader.readAsText(file, "GBK"); // 強制簡體編碼嘗試
            } else {
                startReader(file.name, content);
            }
        };
        reader.readAsText(file, "UTF-8");
        input.value = '';
    }

    function startReader(name, data) {
        document.getElementById('cur-title').innerText = name.replace('.txt','');
        chunks = [];
        for (let i = 0; i < data.length; i += CHUNK_SIZE) {
            chunks.push(data.substring(i, i + CHUNK_SIZE));
        }
        curChunkIdx = 0; curPageIdx = 0;
        loadChunk();
        document.getElementById('library').style.display = 'none';
        document.getElementById('reader').style.display = 'block';
    }

    function loadChunk() {
        const textEl = document.getElementById('content-text');
        let raw = chunks[curChunkIdx];
        textEl.textContent = isTC ? toTC(raw) : raw;
        setTimeout(updateInfo, 50);
        applyPage();
    }

    function pageMove(dir) {
        if(document.getElementById('ui-top').classList.contains('ui-show')) { toggleUI(); return; }
        const canvas = document.getElementById('content-canvas');
        const max = Math.round(canvas.scrollWidth / window.innerWidth);
        
        if (dir === 1 && curPageIdx >= max - 1) {
            if (curChunkIdx < chunks.length - 1) { curChunkIdx++; curPageIdx = 0; loadChunk(); }
        } else if (dir === -1 && curPageIdx <= 0) {
            if (curChunkIdx > 0) { curChunkIdx--; curPageIdx = 0; loadChunk(); }
        } else {
            curPageIdx += dir;
            applyPage();
        }
        updateInfo();
    }

    function applyPage() { document.getElementById('content-canvas').style.transform = `translateX(-${curPageIdx * 100}vw)`; }
    function toggleUI() { document.getElementById('ui-top').classList.toggle('ui-show'); document.getElementById('ui-bottom').classList.toggle('ui-show'); }
    function updateInfo() {
        const canvas = document.getElementById('content-canvas');
        const max = Math.round(canvas.scrollWidth / window.innerWidth);
        document.getElementById('page-info').innerText = `區段 ${curChunkIdx + 1}/${chunks.length} · 頁碼 ${curPageIdx + 1}/${max}`;
    }
    function adjSize(n) {
        const el = document.getElementById('content-text');
        el.style.fontSize = (parseInt(window.getComputedStyle(el).fontSize) + n) + 'px';
        setTimeout(() => { updateInfo(); applyPage(); }, 100);
    }
    function toggleTC() {
        isTC = !isTC;
        document.getElementById('tc-btn').innerText = isTC ? "恢復簡體" : "轉為繁體";
        loadChunk();
    }
    function closeReader() {
        document.getElementById('library').style.display = 'block';
        document.getElementById('reader').style.display = 'none';
        if(document.getElementById('ui-top').classList.contains('ui-show')) toggleUI();
    }
</script>
</body>
</html>
