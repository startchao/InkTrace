<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 閱讀器 v2.0.1e</title>
    <style>
        :root { --bg: #f2f2f7; --card: #ffffff; --text: #1c1c1e; --primary: #007aff; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; }
        #app { max-width: 500px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .v-tag { font-size: 10px; background: #5856d6; color: white; padding: 3px 10px; border-radius: 12px; }
        .book-item { 
            background: var(--card); padding: 18px; border-radius: 14px; margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center;
        }
        #reader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 1000; overflow-y: auto; }
        #content { padding: 30px 20px 150px 20px; font-size: 20px; line-height: 1.8; white-space: pre-wrap; }
        .bar { position: fixed; bottom: 0; width: 100%; background: rgba(245,245,247,0.9); backdrop-filter: blur(10px); padding: 15px 0; display: flex; justify-content: space-around; border-top: 1px solid #ddd; }
        button { border: none; border-radius: 8px; padding: 10px 18px; cursor: pointer; font-size: 14px; }
        .btn-p { background: var(--primary); color: white; font-weight: bold; }
        .btn-s { background: #e5e5ea; color: #000; }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <h2 style="margin:0">書庫 <span class="v-tag">v2.0.1e</span></h2>
        <button class="btn-p" onclick="document.getElementById('f').click()">＋ 上傳小說</button>
    </div>
    
    <input type="file" id="f" style="display:none" onchange="handleUpload(this)">
    
    <div id="list"></div>
    
    <div style="margin-top:40px; text-align:center;">
        <button class="btn-s" style="font-size:10px; opacity:0.5" onclick="resetSystem()">系統強制重置</button>
    </div>
</div>

<div id="reader">
    <div id="content"></div>
    <div class="bar">
        <button class="btn-s" onclick="adj(2)">字體 A+</button>
        <button class="btn-s" onclick="adj(-2)">字體 A-</button>
        <button class="btn-p" onclick="closeR()" style="background:#ff3b30">返回書庫</button>
    </div>
</div>

<script>
    // 核心邏輯：僅存儲標題，內容按需讀取
    let library = JSON.parse(localStorage.getItem('lib_v1') || '[]');

    function handleUpload(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            const content = e.target.result;
            // 存儲策略優化：如果檔案太大，這裡會捕捉錯誤
            try {
                const newBook = {
                    id: Date.now(),
                    title: file.name.replace('.txt', ''),
                    data: content, // 存入內容
                    pos: 0
                };
                library.push(newBook);
                localStorage.setItem('lib_v1', JSON.stringify(library));
                render();
            } catch (err) {
                alert("檔案太大了（超過瀏覽器限制），建議分段上傳或使用電腦版測試。");
            }
        };
        reader.readAsText(file, "UTF-8");
    }

    function render() {
        const list = document.getElementById('list');
        list.innerHTML = library.map((b, i) => `
            <div class="book-item" onclick="openR(${i})">
                <div style="font-weight:600">${b.title}</div>
                <button class="btn-s" style="color:red; padding:5px 10px;" onclick="event.stopPropagation(); del(${i})">刪除</button>
            </div>
        `).join('') || '<p style="color:#999; text-align:center; margin-top:50px;">點選右上角上傳 TXT 小說</p>';
    }

    function openR(i) {
        const b = library[i];
        const reader = document.getElementById('reader');
        const content = document.getElementById('content');
        
        content.textContent = b.data; // 使用 textContent 效能更好且更安全
        reader.style.display = 'block';
        window.scrollTo(0, 0);
        
        // 記錄最後閱讀索引
        localStorage.setItem('last_idx', i);
    }

    function closeR() {
        document.getElementById('reader').style.display = 'none';
        render();
    }

    function del(i) {
        if(confirm('確定刪除這本書嗎？')) {
            library.splice(i, 1);
            localStorage.setItem('lib_v1', JSON.stringify(library));
            render();
        }
    }

    function adj(n) {
        const c = document.getElementById('content');
        const curr = parseInt(window.getComputedStyle(c).fontSize);
        c.style.fontSize = (curr + n) + 'px';
    }

    function resetSystem() {
        if(confirm('這將清除所有已上傳的書籍，確定嗎？')) {
            localStorage.clear();
            location.reload();
        }
    }

    // 初始化
    render();
</script>

</body>
</html>
