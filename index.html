<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Reader</title>
    <style>
        :root { --bg: #ffffff; --text: #333333; }
        body.dark { --bg: #1a1a1a; --text: #cccccc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; transition: 0.3s; }
        
        /* 書庫樣式 */
        #library { padding: 20px; }
        .book-item { 
            padding: 15px; border-bottom: 1px solid #eee; 
            display: flex; justify-content: space-between; align-items: center;
        }

        /* 閱讀器樣式 */
        #reader { display: none; padding: 20px; line-height: 1.8; font-size: 18px; }
        .controls { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); color: white; display: flex; justify-content: space-around; padding: 10px 0; }
        
        #content { white-space: pre-wrap; }
    </style>
</head>
<body>

<div id="library">
    <h2>我的書庫</h2>
    <input type="file" id="fileInput" accept=".txt" style="display:none">
    <button onclick="document.getElementById('fileInput').click()">＋ 上傳 TXT</button>
    <button onclick="toggleTheme()">🌙/☀️ 切換模式</button>
    <div id="bookList"></div>
</div>

<div id="reader">
    <div id="content"></div>
    <div class="controls">
        <button onclick="changeFontSize(-2)">A-</button>
        <button onclick="changeFontSize(2)">A+</button>
        <button onclick="closeReader()">返回書庫</button>
    </div>
</div>

<script src="https://unpkg.com/dexie/dist/dexie.js"></script>
<script>
    // --- 資料庫初始化 ---
    const db = new Dexie("ReaderDB");
    db.version(1).stores({ books: '++id, title, lastRead' });

    // --- 核心功能：上傳 ---
    document.getElementById('fileInput').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const text = await file.text();
        await db.books.add({ title: file.name, content: text, progress: 0, lastRead: Date.now() });
        renderLibrary();
    };

    // --- 核心功能：書庫渲染 ---
    async function renderLibrary() {
        const books = await db.books.reverse().sortBy('lastRead');
        const list = document.getElementById('bookList');
        list.innerHTML = books.map(b => `
            <div class="book-item" oncontextmenu="deleteBook(event, ${b.id})">
                <span onclick="openBook(${b.id})">${b.title}</span>
                <small>${Math.round(b.progress * 100)}%</small>
            </div>
        `).join('');
    }

    // --- 核心功能：閱讀器控制 ---
    let currentBookId = null;
    async function openBook(id) {
        const book = await db.books.get(id);
        currentBookId = id;
        document.getElementById('content').innerText = book.content;
        document.getElementById('library').style.display = 'none';
        document.getElementById('reader').style.display = 'block';
        window.scrollTo(0, book.progress * document.body.scrollHeight);
    }

    function closeReader() {
        const progress = window.scrollY / document.body.scrollHeight;
        db.books.update(currentBookId, { progress: progress, lastRead: Date.now() });
        document.getElementById('library').style.display = 'block';
        document.getElementById('reader').style.display = 'none';
        renderLibrary();
    }

    // --- 輔助功能 ---
    function changeFontSize(delta) {
        const el = document.getElementById('content');
        const cur = parseInt(window.getComputedStyle(el).fontSize);
        el.style.fontSize = (cur + delta) + 'px';
    }

    function toggleTheme() { document.body.classList.toggle('dark'); }

    async function deleteBook(e, id) {
        e.preventDefault();
        if(confirm('確定要刪除這本書嗎？')) {
            await db.books.delete(id);
            renderLibrary();
        }
    }

    renderLibrary();
</script>
</body>
</html>
