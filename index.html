<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的雲端閱覽室</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        :root { 
            --bg: #f5f5f7; --card: #ffffff; --text: #1d1d1f; --primary: #0071e3; 
        }
        body.dark { 
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --primary: #0a84ff; 
        }

        body { 
            background-color: var(--bg); color: var(--text); 
            font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0; transition: 0.3s; line-height: 1.6;
        }

        /* 書庫介面 */
        #library { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-group { display: flex; gap: 10px; }
        
        button {
            background: var(--primary); color: white; border: none; 
            padding: 10px 18px; border-radius: 12px; font-size: 14px;
            cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .book-list { display: grid; gap: 12px; }
        .book-item { 
            background: var(--card); padding: 16px; border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            user-select: none; -webkit-touch-callout: none;
        }

        .progress-tag { font-size: 12px; color: #888; background: rgba(0,0,0,0.05); padding: 4px 10px; border-radius: 20px; }

        /* 閱讀器介面 */
        #reader { display: none; min-height: 100vh; background: var(--bg); }
        #content { 
            padding: 40px 25px 120px 25px; 
            white-space: pre-wrap; word-wrap: break-word; 
            font-size: 20px; line-height: 1.8;
            max-width: 800px; margin: 0 auto;
        }

        .controls { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; padding: 15px 0;
            color: white; border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .controls button { background: transparent; box-shadow: none; border: 1px solid white; }
    </style>
</head>
<body>

<div id="library">
    <div class="header">
        <h2>我的書庫</h2>
        <div class="btn-group">
            <button onclick="document.getElementById('fileInput').click()">＋ 上傳</button>
            <button onclick="toggleTheme()">🌙/☀️</button>
        </div>
    </div>
    <input type="file" id="fileInput" accept=".txt" style="display:none">
    <div id="bookList" class="book-list"></div>
    <p style="text-align:center; color:#999; font-size:12px; margin-top:20px;">提示：手機長按書名可刪除書籍</p>
</div>

<div id="reader">
    <div id="content"></div>
    <div class="controls">
        <button onclick="changeFontSize(-2)">A-</button>
        <button onclick="changeFontSize(2)">A+</button>
        <button onclick="closeReader()">返回書庫</button>
    </div>
</div>

<script>
    // 1. 初始化資料庫
    const db = new Dexie("ReaderDB");
    db.version(1).stores({ books: '++id, title, lastRead' });

    // 2. 上傳功能 (修正編碼問題)
    document.getElementById('fileInput').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (event) => {
            const text = event.target.result;
            await db.books.add({ 
                title: file.name.replace('.txt', ''), 
                content: text, 
                progress: 0, 
                lastRead: Date.now() 
            });
            renderLibrary();
        };
        reader.readAsText(file, "UTF-8"); // 強制 UTF-8 避免亂碼
    };

    // 3. 渲染書庫 (加入長按判斷)
    let touchTimer;
    async function renderLibrary() {
        const books = await db.books.reverse().sortBy('lastRead');
        const list = document.getElementById('bookList');
        
        if (books.length === 0) {
            list.innerHTML = '<p style="text-align:center; color:#999;">書庫空空如也，請上傳 TXT</p>';
            return;
        }

        list.innerHTML = books.map(b => `
            <div class="book-item" 
                 ontouchstart="handleTouchStart(${b.id})" 
                 ontouchend="handleTouchEnd()"
                 onmousedown="handleTouchStart(${b.id})"
                 onmouseup="handleTouchEnd()"
                 onclick="openBook(${b.id})">
                <span style="font-weight:600;">${b.title}</span>
                <span class="progress-tag">${Math.round((b.progress || 0) * 100)}%</span>
            </div>
        `).join('');
    }

    // 4. 開啟書籍
    let currentBookId = null;
    async function openBook(id) {
        const book = await db.books.get(id);
        if (!book) return;
        
        currentBookId = id;
        const contentEl = document.getElementById('content');
        contentEl.innerText = book.content; // 填入內容
        
        document.getElementById('library').style.display = 'none';
        document.getElementById('reader').style.display = 'block';

        // 恢復進度
        setTimeout(() => {
            const total = document.documentElement.scrollHeight - window.innerHeight;
            window.scrollTo(0, book.progress * total);
        }, 100);
    }

    // 5. 關閉並儲存進度
    function closeReader() {
        const total = document.documentElement.scrollHeight - window.innerHeight;
        const progress = total > 0 ? window.scrollY / total : 0;

        db.books.update(currentBookId, { 
            progress: progress, 
            lastRead: Date.now() 
        }).then(() => {
            document.getElementById('library').style.display = 'block';
            document.getElementById('reader').style.display = 'none';
            renderLibrary();
            window.scrollTo(0, 0);
        });
    }

    // 6. 輔助功能
    function changeFontSize(delta) {
        const el = document.getElementById('content');
        const cur = parseInt(window.getComputedStyle(el).fontSize);
        el.style.fontSize = (cur + delta) + 'px';
    }

    function toggleTheme() {
        document.body.classList.toggle('dark');
        localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    }

    // 長按偵測
    function handleTouchStart(id) {
        touchTimer = setTimeout(async () => {
            if (confirm('確定要刪除這本書嗎？')) {
                await db.books.delete(id);
                renderLibrary();
            }
        }, 800);
    }
    function handleTouchEnd() { clearTimeout(touchTimer); }

    // 初始化檢查主題
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
    renderLibrary();
</script>

</body>
</html>
