<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>極簡小說閱讀器 v1.0.0</title>
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogImVBYm9vayBSZWFkZXIiLAogICJzaG9ydF9uYW1lIjogIsm26Zmq6K6A6K6A5ZmoIiwKICAic3RhcnRfdXJsIjogIi4iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiNmZmZmZmYiLAogICJ0aGVtZV9jb2xvciI6ICIjMDAwMDAwIgp9">
    
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --ui-bg: rgba(255, 255, 255, 0.95);
            --accent-color: #007AFF;
            --highlight-bg: #e0e0e0;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #cccccc;
            --ui-bg: rgba(30, 30, 30, 0.95);
            --highlight-bg: #333333;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: -apple-system, "Noto Sans TC", sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
        }

        /* 閱讀區域 */
        #reader-container {
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            position: relative; transition: background 0.3s;
        }

        #content-area {
            flex: 1; padding: 20px;
            column-width: calc(100vw - 40px);
            column-gap: 40px;
            overflow: hidden;
            text-align: justify;
            transition: transform 0.3s ease-out;
        }

        .paragraph { margin-bottom: 1em; word-break: break-all; }
        .speaking { background-color: var(--highlight-bg); border-radius: 4px; }

        /* 互動區域 */
        #touch-zones {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: grid; grid-template-columns: 30% 40% 30%; z-index: 5;
        }

        /* 控制面板 */
        #ui-overlay {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--ui-bg); z-index: 10;
            transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px; border-radius: 20px 20px 0 0;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            max-height: 80vh; overflow-y: auto;
        }
        #ui-overlay.active { transform: translateY(0); }

        .control-group { margin-bottom: 20px; }
        .control-label { font-size: 14px; margin-bottom: 8px; color: #888; }
        .btn-row { display: flex; flex-wrap: wrap; gap: 8px; }
        button {
            padding: 8px 12px; border: 1px solid #ddd; background: white;
            border-radius: 6px; cursor: pointer; font-size: 14px;
        }
        [data-theme="dark"] button { background: #333; color: #eee; border-color: #444; }
        button.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }

        /* 章節目錄 */
        #toc-list { max-height: 200px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; border-radius: 8px; }
        .toc-item { padding: 8px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 14px; }

        /* 初始上傳介面 */
        #drop-zone {
            position: fixed; inset: 0; background: var(--bg-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; padding: 20px; text-align: center;
        }
        .version-tag { font-size: 12px; color: #999; margin-top: 20px; }
    </style>
</head>
<body>

<div id="drop-zone">
    <h2>極簡小說閱讀器</h2>
    <p>拖拽 TXT 檔案至此或點擊按鈕上傳</p>
    <input type="file" id="file-input" accept=".txt" hidden>
    <button onclick="document.getElementById('file-input').click()" style="padding: 15px 30px; font-size: 18px;">選擇檔案</button>
    <div class="version-tag">v1.0.0</div>
</div>

<div id="reader-container">
    <div id="content-area"></div>
    <div id="touch-zones">
        <div id="prev-zone"></div>
        <div id="menu-zone"></div>
        <div id="next-zone"></div>
    </div>
</div>

<div id="ui-overlay">
    <div class="control-group">
        <div class="control-label">進度：<span id="progress-text">0%</span></div>
        <div id="toc-list"></div>
    </div>

    <div class="control-group">
        <div class="control-label">朗讀控制 (TTS)</div>
        <div class="btn-row">
            <button onclick="reader.toggleTTS()" id="btn-tts">開始朗讀</button>
            <button onclick="reader.stopTTS()">停止</button>
        </div>
    </div>

    <div class="control-group">
        <div class="control-label">語速 / 睡眠定時</div>
        <div class="btn-row" id="speed-btns"></div>
        <div class="btn-row" id="timer-btns" style="margin-top: 8px;"></div>
    </div>

    <div class="control-group">
        <div class="control-label">字體 / 行距 / 轉換</div>
        <div class="btn-row">
            <button onclick="reader.updateConfig('fontSize', 16)">16</button>
            <button onclick="reader.updateConfig('fontSize', 20)">20</button>
            <button onclick="reader.updateConfig('fontSize', 24)">24</button>
            <button onclick="reader.toggleTChinese()" id="btn-tc">顯示繁體</button>
            <button onclick="reader.toggleTheme()">切換日夜模式</button>
        </div>
    </div>
    
    <div class="control-group">
        <div class="btn-row">
            <button onclick="reader.addBookmark()">加入書籤</button>
            <button onclick="reader.showBookmarks()">查看書籤</button>
        </div>
    </div>

    <center class="version-tag">版本 v1.0.0 | 點擊空白處關閉選單</center>
</div>

<script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>

<script>
/**
 * 小說閱讀器核心邏輯
 */
class NovelReader {
    constructor() {
        this.paragraphs = [];
        this.currentPage = 0;
        this.config = {
            fontSize: 18,
            lineHeight: 1.5,
            theme: 'light',
            useTChinese: true,
            speed: 1.0,
            lastPara: 0
        };
        this.isTTSPlaying = false;
        this.timer = null;
        this.synth = window.speechSynthesis;
        this.converter = OpenCC.Converter({ from: 'cn', to: 'tw' });
        
        this.init();
    }

    init() {
        this.loadSettings();
        this.bindEvents();
        this.renderControlBtns();
    }

    // --- 檔案處理 ---
    async handleFile(file) {
        const buffer = await file.arrayBuffer();
        const decoder = new TextDecoder('utf-8');
        let text = decoder.decode(buffer);

        // 簡單編碼偵測判定 (若亂碼則嘗試 GBK)
        if (text.includes('')) {
            text = new TextDecoder('gbk').decode(buffer);
        }

        document.getElementById('drop-zone').style.display = 'none';
        this.parseText(text);
    }

    parseText(text) {
        // 分段並過濾空行
        let rawParas = text.split(/\r?\n/).filter(p => p.trim() !== '');
        
        this.paragraphs = [];
        const toc = [];

        rawParas.forEach((p, index) => {
            let content = p.trim();
            if (this.config.useTChinese) content = this.converter(content);
            
            // 長段落自動分割 (為了 TTS)
            if (content.length > 500) {
                const chunks = content.match(/.{1,500}/g);
                chunks.forEach(c => this.paragraphs.push(c));
            } else {
                this.paragraphs.push(content);
            }

            // 章節偵測
            if (/第[一二三四五六七八九十百千萬0-9]+[章回]/.test(content.substring(0, 10))) {
                toc.push({ index: this.paragraphs.length - 1, title: content.substring(0, 20) });
            }
        });

        this.renderTOC(toc);
        this.jumpToParagraph(this.config.lastPara);
    }

    // --- 分頁與渲染引擎 ---
    renderPage() {
        const area = document.getElementById('content-area');
        area.innerHTML = '';
        area.style.fontSize = this.config.fontSize + 'px';
        area.style.lineHeight = this.config.lineHeight;

        // 智慧分頁：只渲染當前及鄰近段落以節省效能
        // 實際應用中，我們會根據區域高度計算段落數量
        let currentIdx = this.config.lastPara;
        const fragment = document.createDocumentFragment();
        
        // 渲染約 10 段 (足夠填滿一屏手機畫面)
        for (let i = currentIdx; i < Math.min(currentIdx + 10, this.paragraphs.length); i++) {
            const p = document.createElement('div');
            p.className = 'paragraph';
            p.id = `para-${i}`;
            p.innerText = this.paragraphs[i];
            fragment.appendChild(p);
        }
        area.appendChild(fragment);
        
        document.getElementById('progress-text').innerText = 
            Math.round((currentIdx / this.paragraphs.length) * 100) + '%';
        
        this.saveSettings();
    }

    // --- 導航 ---
    nextPage() {
        if (this.config.lastPara < this.paragraphs.length - 5) {
            this.config.lastPara += 3; // 模擬翻頁，實際可優化為高度計算
            this.renderPage();
        }
    }

    prevPage() {
        if (this.config.lastPara > 0) {
            this.config.lastPara = Math.max(0, this.config.lastPara - 3);
            this.renderPage();
        }
    }

    jumpToParagraph(index) {
        this.config.lastPara = index;
        this.renderPage();
        this.toggleMenu(false);
    }

    // --- TTS 朗讀功能 ---
    toggleTTS() {
        if (this.isTTSPlaying) {
            this.synth.pause();
            this.isTTSPlaying = false;
            document.getElementById('btn-tts').innerText = '繼續朗讀';
        } else {
            if (this.synth.paused) {
                this.synth.resume();
            } else {
                this.speak(this.config.lastPara);
            }
            this.isTTSPlaying = true;
            document.getElementById('btn-tts').innerText = '暫停朗讀';
        }
    }

    stopTTS() {
        this.synth.cancel();
        this.isTTSPlaying = false;
        document.querySelectorAll('.speaking').forEach(el => el.classList.remove('speaking'));
        document.getElementById('btn-tts').innerText = '開始朗讀';
    }

    speak(index) {
        if (index >= this.paragraphs.length || !this.isTTSPlaying) return;

        this.stopTTS();
        this.isTTSPlaying = true;
        this.config.lastPara = index;
        this.renderPage();

        const msg = new SpeechSynthesisUtterance(this.paragraphs[index]);
        msg.rate = this.config.speed;
        msg.lang = 'zh-TW';

        const el = document.getElementById(`para-${index}`);
        if (el) el.classList.add('speaking');

        msg.onend = () => {
            if (this.isTTSPlaying) this.speak(index + 1);
        };

        this.synth.speak(msg);
    }

    // --- UI 與設定 ---
    toggleTheme() {
        this.config.theme = this.config.theme === 'light' ? 'dark' : 'light';
        document.body.setAttribute('data-theme', this.config.theme);
        this.saveSettings();
    }

    toggleTChinese() {
        this.config.useTChinese = !this.config.useTChinese;
        alert('轉換設定已更改，重新載入章節中...');
        this.parseText(this.paragraphs.join('\n')); // 重新解析簡易處理
    }

    updateConfig(key, val) {
        this.config[key] = val;
        this.renderPage();
    }

    toggleMenu(show) {
        const menu = document.getElementById('ui-overlay');
        if (show === undefined) menu.classList.toggle('active');
        else show ? menu.classList.add('active') : menu.classList.remove('active');
    }

    renderControlBtns() {
        const speeds = [0.5, 1, 1.5, 2];
        const speedContainer = document.getElementById('speed-btns');
        speeds.forEach(s => {
            const btn = document.createElement('button');
            btn.innerText = s + 'x';
            btn.onclick = () => { this.config.speed = s; alert('語速已設為 ' + s); };
            speedContainer.appendChild(btn);
        });

        const times = [5, 10, 30];
        const timerContainer = document.getElementById('timer-btns');
        times.forEach(t => {
            const btn = document.createElement('button');
            btn.innerText = t + '分';
            btn.onclick = () => {
                if (this.timer) clearTimeout(this.timer);
                this.timer = setTimeout(() => this.stopTTS(), t * 60000);
                alert(t + ' 分鐘後將停止朗讀');
            };
            timerContainer.appendChild(btn);
        });
    }

    renderTOC(toc) {
        const list = document.getElementById('toc-list');
        list.innerHTML = '';
        toc.forEach(item => {
            const div = document.createElement('div');
            div.className = 'toc-item';
            div.innerText = item.title;
            div.onclick = () => this.jumpToParagraph(item.index);
            list.appendChild(div);
        });
    }

    // --- 書籤與儲存 ---
    addBookmark() {
        let bms = JSON.parse(localStorage.getItem('bookmarks') || '[]');
        bms.push({ para: this.config.lastPara, title: this.paragraphs[this.config.lastPara].substring(0,15) });
        localStorage.setItem('bookmarks', JSON.stringify(bms));
        alert('已加入書籤');
    }

    showBookmarks() {
        let bms = JSON.parse(localStorage.getItem('bookmarks') || '[]');
        if (bms.length === 0) return alert('尚無書籤');
        let txt = bms.map((b, i) => `${i}: ${b.title}`).join('\n');
        let choice = prompt(txt + '\n輸入編號跳轉:');
        if (choice !== null) this.jumpToParagraph(bms[parseInt(choice)].para);
    }

    saveSettings() {
        localStorage.setItem('reader_config', JSON.stringify(this.config));
    }

    loadSettings() {
        const saved = localStorage.getItem('reader_config');
        if (saved) {
            this.config = Object.assign(this.config, JSON.parse(saved));
            document.body.setAttribute('data-theme', this.config.theme);
        }
    }

    bindEvents() {
        // 檔案上傳
        document.getElementById('file-input').onchange = (e) => this.handleFile(e.target.files[0]);
        
        // 點擊區域
        document.getElementById('prev-zone').onclick = () => this.prevPage();
        document.getElementById('next-zone').onclick = () => this.nextPage();
        document.getElementById('menu-zone').onclick = () => this.toggleMenu();

        // 拖放
        window.ondragover = (e) => e.preventDefault();
        window.ondrop = (e) => {
            e.preventDefault();
            this.handleFile(e.dataTransfer.files[0]);
        };
    }
}

// 啟動
const reader = new NovelReader();

// Service Worker 註冊 (PWA)
if ('serviceWorker' in navigator) {
    const swCode = `
        self.addEventListener('fetch', function(e) {
            e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
        });
    `;
    const blob = new Blob([swCode], {type: 'text/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob));
}
</script>
</body>
</html>
